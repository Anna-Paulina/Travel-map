<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css">
<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont;
}
#map {
  height: 90vh;
}
.popup-img {
  width: 100%;
  max-width: 300px;
  height: 200px;
  margin-top: 6px;
  border-radius: 8px;
  object-fit: cover;
  background: #f0f0f0;
  display: block;
}
.popup-content {
  min-width: 250px;
}
.loading-img {
  width: 100%;
  max-width: 300px;
  height: 200px;
  margin-top: 6px;
  border-radius: 8px;
  background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
  background-size: 200% 100%;
  animation: loading 1.5s infinite;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #666;
}
@keyframes loading {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.img-credit {
  font-size: 10px;
  color: #666;
  margin-top: 2px;
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
</head>
<body>
<h3 style="padding:8px">🌍 Travel Route</h3>
<div id="map"></div>
<script>
// ========================
// CONFIGURATION
// ========================
const UNSPLASH_ACCESS_KEY = 'jULX67EqogcoOXFzX1B9aMycHG0mkue8yVMzMFJs4eY';

const map = L.map("map").setView([15, -90], 5);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap"
}).addTo(map);

// ========================
// IMAGE FETCH FUNCTION - CORRIGÉ
// ========================
async function getPlaceImage(placeName, lat, lng) {
  console.log(`🔍 Searching image for: ${placeName}`);
  
  // Nettoyer le nom pour une meilleure recherche
  const cleanName = placeName
    .replace(/\s+(Brésil|Brazil|Colombie|Colombia|Argentina|Argentine|Pérou|Peru|Chile|Chili|Bolivie|Bolivia)/gi, '')
    .trim();
  
  // Strategy 1: Unsplash avec ta vraie clé
  try {
    console.log('Trying Unsplash...');
    const response = await fetch(
      `https://api.unsplash.com/search/photos?query=${encodeURIComponent(cleanName)}&per_page=1&orientation=landscape`,
      {
        headers: {
          'Authorization': `Client-ID ${jULX67Eqogco0XFz1B9aMycHG0mKue8yVMzMFJs4eY}`
        }
      }
    );
    
    if (response.ok) {
      const data = await response.json();
      console.log('Unsplash response:', data);
      
      if (data.results && data.results.length > 0) {
        const photo = data.results[0];
        console.log('✓ Unsplash image found!');
        return {
          url: photo.urls.regular,
          credit: `Photo by ${photo.user.name} on Unsplash`,
          creditUrl: photo.links.html
        };
      } else {
        console.log('No Unsplash results for:', cleanName);
      }
    } else {
      console.error('Unsplash error:', response.status, response.statusText);
    }
  } catch (error) {
    console.error('Unsplash fetch failed:', error);
  }
  
  // Strategy 2: Wikimedia Commons
  try {
    console.log('Trying Wikimedia...');
    const searchUrl = `https://en.wikipedia.org/w/api.php?` +
      `action=query&format=json&origin=*&` +
      `prop=pageimages&piprop=original&` +
      `titles=${encodeURIComponent(cleanName)}`;
    
    const response = await fetch(searchUrl);
    const data = await response.json();
    
    if (data.query && data.query.pages) {
      const pages = Object.values(data.query.pages);
      if (pages[0] && pages[0].original) {
        console.log('✓ Wikimedia image found!');
        return {
          url: pages[0].original.source,
          credit: 'Wikimedia Commons',
          creditUrl: null
        };
      }
    }
    console.log('No Wikimedia image found');
  } catch (error) {
    console.error('Wikimedia fetch failed:', error);
  }
  
  // Strategy 3: Carte satellite avec Mapbox (toujours fonctionne)
  console.log('Using Mapbox satellite fallback');
  return {
    url: `https://api.mapbox.com/styles/v1/mapbox/satellite-streets-v11/static/${lng},${lat},11,0/400x300@2x?access_token=pk.eyJ1IjoibWFwYm94IiwiYSI6ImNpejY4NXVycTA2emYycXBndHRqcmZ3N3gifQ.rJcFIG214AriISLbB6B5aw`,
    credit: 'Satellite Map',
    creditUrl: null
  };
}

// ========================
// LOAD CSV
// ========================
Papa.parse("trip.csv", {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {
    console.log(`CSV loaded: ${results.data.length} locations`);
    const points = [];
    const bounds = [];
    
    results.data.forEach((row, idx) => {
      const lat = parseFloat(row.Latitude);
      const lng = parseFloat(row.Longitude);
      const name = row.Lieu || row.Place || "Unknown";
      const days = row["Jours sur place"] || row.Days || "N/A";
      
      if (isNaN(lat) || isNaN(lng)) {
        console.warn(`Invalid coordinates for: ${name}`);
        return;
      }
      
      console.log(`Adding marker: ${name}`);
      const marker = L.marker([lat, lng]).addTo(map);
      
      const popupContent = `
        <div class="popup-content">
          <strong>${name}</strong><br>
          ⏱ ${days} jour(s)<br>
          <div class="loading-img">Chargement...</div>
        </div>
      `;
      
      marker.bindPopup(popupContent, { maxWidth: 350 });
      
      // Load image when popup is opened
      marker.on('popupopen', async function(e) {
        console.log(`Popup opened for: ${name}`);
        const popup = e.popup;
        
        try {
          const imageData = await getPlaceImage(name, lat, lng);
          
          const creditHtml = imageData.creditUrl 
            ? `<a href="${imageData.creditUrl}" target="_blank" class="img-credit">${imageData.credit}</a>`
            : `<div class="img-credit">${imageData.credit}</div>`;
          
          popup.setContent(`
            <div class="popup-content">
              <strong>${name}</strong><br>
              ⏱ ${days} jour(s)<br>
              <img class="popup-img" 
                   src="${imageData.url}" 
                   alt="${name}"
                   onload="console.log('✓ Image loaded successfully')"
                   onerror="console.error('✗ Image failed to load'); this.src='https://via.placeholder.com/400x300/1976D2/FFFFFF?text=${encodeURIComponent(name.substring(0,20))}'">
              ${creditHtml}
            </div>
          `);
          
        } catch (error) {
          console.error('Error loading image:', error);
          popup.setContent(`
            <div class="popup-content">
              <strong>${name}</strong><br>
              ⏱ ${days} jour(s)<br>
              <div style="padding:16px;background:#fee;color:#c33;border-radius:8px;margin-top:8px;">
                ❌ Erreur de chargement
              </div>
            </div>
          `);
        }
      });
      
      const ll = L.latLng(lat, lng);
      points.push(ll);
      bounds.push(ll);
    });
    
    if (bounds.length) {
      map.fitBounds(bounds);
      console.log(`Map fitted to ${bounds.length} points`);
    }
    
    if (points.length > 1) {
      console.log('Drawing routes...');
      drawRouteSegments(points);
    }
  },
  error: function(error) {
    console.error('CSV parse error:', error);
  }
});

// ========================
// ROUTING
// ========================
function drawRouteSegments(points) {
  let i = 0;
  
  function next() {
    if (i >= points.length - 1) {
      console.log('✓ All routes drawn');
      return;
    }
    
    const from = points[i];
    const to = points[i + 1];
    
    const routing = L.Routing.control({
      waypoints: [from, to],
      router: L.Routing.osrmv1({
        serviceUrl: "https://router.project-osrm.org/route/v1"
      }),
      addWaypoints: false,
      draggableWaypoints: false,
      fitSelectedRoutes: false,
      show: false,
      createMarker: () => null,
      lineOptions: {
        styles: [{
          color: '#1e88e5',
          opacity: 0.8,
          weight: 5
        }]
      }
    }).addTo(map);
    
    routing.on("routesfound", e => {
      const route = e.routes[0];
      const distance = route.summary ? route.summary.totalDistance : 0;
      const time = route.summary ? route.summary.totalTime : 0;
      
      console.log(`✓ Route ${i+1} found: ${(distance/1000).toFixed(1)}km`);
      
      const routeLine = routing._line;
      if (routeLine) {
        routeLine.on("click", ev => {
          L.popup()
            .setLatLng(ev.latlng)
            .setContent(`
              🚗 <strong>Segment ${i+1}</strong><br>
              Distance: ${(distance / 1000).toFixed(1)} km<br>
              Durée: ${(time / 3600).toFixed(1)} h
            `)
            .openOn(map);
        });
      }
      
      i++;
      setTimeout(next, 800);
    });
    
    routing.on("routingerror", (e) => {
      console.warn(`Route ${i+1} error, drawing straight line`);
      
      const line = L.polyline([from, to], {
        color: "#e53935",
        weight: 4,
        dashArray: "6,6",
        opacity: 0.7
      }).addTo(map);
      
      const km = from.distanceTo(to) / 1000;
      line.on("click", ev => {
        L.popup()
          .setLatLng(ev.latlng)
          .setContent(`
            ⚠️ Pas de route disponible<br>
            Distance (à vol d'oiseau): ${km.toFixed(1)} km
          `)
          .openOn(map);
      });
      
      i++;
      setTimeout(next, 800);
    });
  }
  
  next();
}

console.log('✓ Script loaded successfully');
</script>
</body>
</html>
