<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css">
<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont;
}
#map {
  height: 90vh;
}
.popup-img {
  width: 100%;
  max-width: 300px;
  height: 200px;
  margin-top: 6px;
  border-radius: 8px;
  object-fit: cover;
  background: #f0f0f0;
  display: block;
}
.popup-content {
  min-width: 250px;
}
.loading-img {
  width: 100%;
  max-width: 300px;
  height: 200px;
  margin-top: 6px;
  border-radius: 8px;
  background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
  background-size: 200% 100%;
  animation: loading 1.5s infinite;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #666;
}
@keyframes loading {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.img-credit {
  font-size: 10px;
  color: #666;
  margin-top: 4px;
}
.img-credit a {
  color: #1976d2;
  text-decoration: none;
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
</head>
<body>
<h3 style="padding:8px">🌍 Travel Route</h3>
<div id="map"></div>
<script>
// ========================
// CONFIGURATION
// ========================
const UNSPLASH_ACCESS_KEY = 'jULX67EqogcoOXFzX1B9aMycHG0mkue8yVMzMFJs4eY';

const map = L.map("map").setView([15, -90], 5);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap"
}).addTo(map);

// ========================
// IMAGE FETCH FUNCTION
// ========================
async function getPlaceImage(placeName, lat, lng, index) {
  console.log(`🔍 Searching image for: ${placeName}`);
  
  // Nettoyer le nom pour une meilleure recherche
  const cleanName = placeName
    .replace(/\s+(Brésil|Brazil|Colombie|Colombia|Argentina|Argentine|Pérou|Peru|Chile|Chili|Bolivie|Bolivia|Tadjikistan|Tajikistan)/gi, '')
    .trim();
  
  console.log(`   Cleaned name: ${cleanName}`);
  
  // Strategy 1: Unsplash
  try {
    console.log('   Trying Unsplash...');
    const response = await fetch(
      `https://api.unsplash.com/search/photos?query=${encodeURIComponent(cleanName)}&per_page=1&orientation=landscape`,
      {
        headers: {
          'Authorization': `Client-ID ${UNSPLASH_ACCESS_KEY}`
        }
      }
    );
    
    console.log(`   Unsplash status: ${response.status}`);
    
    if (response.ok) {
      const data = await response.json();
      console.log(`   Unsplash results: ${data.results ? data.results.length : 0}`);
      
      if (data.results && data.results.length > 0) {
        const photo = data.results[0];
        console.log('   ✓ Unsplash image found!');
        return {
          url: photo.urls.regular,
          credit: `Photo by ${photo.user.name} on Unsplash`,
          creditUrl: photo.links.html,
          source: 'Unsplash'
        };
      }
    }
  } catch (error) {
    console.error('   Unsplash error:', error.message);
  }
  
  // Strategy 2: Wikimedia Commons
  try {
    console.log('   Trying Wikimedia...');
    const searchUrl = `https://en.wikipedia.org/w/api.php?` +
      `action=query&format=json&origin=*&` +
      `prop=pageimages&piprop=original&` +
      `titles=${encodeURIComponent(cleanName)}`;
    
    const response = await fetch(searchUrl);
    const data = await response.json();
    
    if (data.query && data.query.pages) {
      const pages = Object.values(data.query.pages);
      if (pages[0] && pages[0].original) {
        console.log('   ✓ Wikimedia image found!');
        return {
          url: pages[0].original.source,
          credit: 'Wikimedia Commons',
          creditUrl: null,
          source: 'Wikipedia'
        };
      }
    }
    console.log('   No Wikimedia image');
  } catch (error) {
    console.error('   Wikimedia error:', error.message);
  }
  
  // Strategy 3: LoremFlickr (toujours fonctionne, vraies photos)
  console.log('   Using LoremFlickr...');
  const keywords = cleanName.split(' ').slice(0, 2).join(',');
  return {
    url: `https://loremflickr.com/400/300/${keywords}?lock=${index}`,
    credit: 'LoremFlickr',
    creditUrl: null,
    source: 'LoremFlickr'
  };
}

// ========================
// LOAD CSV
// ========================
Papa.parse("trip.csv", {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {
    console.log(`📄 CSV loaded: ${results.data.length} locations`);
    const points = [];
    const bounds = [];
    
    results.data.forEach((row, idx) => {
      const lat = parseFloat(row.Latitude);
      const lng = parseFloat(row.Longitude);
      const name = row.Lieu || row.Place || "Unknown";
      const days = row["Jours sur place"] || row.Days || "N/A";
      
      if (isNaN(lat) || isNaN(lng)) {
        console.warn(`⚠️ Invalid coordinates for: ${name}`);
        return;
      }
      
      console.log(`📍 Adding marker ${idx + 1}: ${name}`);
      const marker = L.marker([lat, lng]).addTo(map);
      
      const popupContent = `
        <div class="popup-content">
          <strong>${name}</strong><br>
          ⏱ ${days} jour(s)<br>
          <div class="loading-img">🔍 Recherche...</div>
        </div>
      `;
      
      marker.bindPopup(popupContent, { maxWidth: 350 });
      
      // Load image when popup is opened
      marker.on('popupopen', async function(e) {
        console.log(`\n👆 Popup opened for: ${name}`);
        const popup = e.popup;
        
        try {
          const imageData = await getPlaceImage(name, lat, lng, idx);
          
          console.log(`   Selected source: ${imageData.source}`);
          console.log(`   Image URL: ${imageData.url}`);
          
          const creditHtml = imageData.creditUrl 
            ? `<a href="${imageData.creditUrl}" target="_blank" class="img-credit">${imageData.credit}</a>`
            : `<div class="img-credit">${imageData.credit}</div>`;
          
          const imgId = `img-${idx}`;
          
          popup.setContent(`
            <div class="popup-content">
              <strong>${name}</strong><br>
              ⏱ ${days} jour(s)<br>
              <img id="${imgId}" 
                   class="popup-img" 
                   src="${imageData.url}" 
                   alt="${name}">
              ${creditHtml}
            </div>
          `);
          
          // Ajouter les handlers après que l'image soit dans le DOM
          setTimeout(() => {
            const img = document.getElementById(imgId);
            if (img) {
              img.onload = function() {
                console.log(`   ✅ Image loaded successfully from ${imageData.source}`);
              };
              img.onerror = function() {
                console.error(`   ❌ Image failed to load from ${imageData.source}`);
                console.error(`   Failed URL: ${this.src}`);
                // Dernier fallback absolu
                this.style.display = 'none';
                this.insertAdjacentHTML('afterend', 
                  `<div style="width:300px;height:200px;background:#e3f2fd;display:flex;align-items:center;justify-content:center;border-radius:8px;color:#1976d2;text-align:center;padding:20px;margin-top:6px;">
                    <div>
                      <div style="font-size:40px;margin-bottom:10px;">📍</div>
                      <div style="font-weight:bold;">${name}</div>
                      <div style="font-size:12px;margin-top:8px;color:#666;">${lat.toFixed(4)}, ${lng.toFixed(4)}</div>
                    </div>
                  </div>`
                );
              };
            }
          }, 100);
          
        } catch (error) {
          console.error('❌ Error in getPlaceImage:', error);
          popup.setContent(`
            <div class="popup-content">
              <strong>${name}</strong><br>
              ⏱ ${days} jour(s)<br>
              <div style="width:300px;height:200px;background:#ffebee;display:flex;align-items:center;justify-content:center;border-radius:8px;color:#c62828;margin-top:6px;">
                <div style="text-align:center;padding:20px;">
                  <div style="font-size:40px;margin-bottom:10px;">⚠️</div>
                  <div>Erreur de chargement</div>
                </div>
              </div>
            </div>
          `);
        }
      });
      
      const ll = L.latLng(lat, lng);
      points.push(ll);
      bounds.push(ll);
    });
    
    if (bounds.length) {
      map.fitBounds(bounds);
      console.log(`🗺️ Map fitted to ${bounds.length} points`);
    }
    
    if (points.length > 1) {
      console.log(`🛣️ Drawing routes between ${points.length} points...\n`);
      drawRouteSegments(points);
    }
  },
  error: function(error) {
    console.error('❌ CSV parse error:', error);
  }
});

// ========================
// ROUTING
// ========================
function drawRouteSegments(points) {
  let i = 0;
  
  function next() {
    if (i >= points.length - 1) {
      console.log('✅ All routes drawn\n');
      return;
    }
    
    const from = points[i];
    const to = points[i + 1];
    
    const routing = L.Routing.control({
      waypoints: [from, to],
      router: L.Routing.osrmv1({
        serviceUrl: "https://router.project-osrm.org/route/v1"
      }),
      addWaypoints: false,
      draggableWaypoints: false,
      fitSelectedRoutes: false,
      show: false,
      createMarker: () => null,
      lineOptions: {
        styles: [{
          color: '#1e88e5',
          opacity: 0.8,
          weight: 5
        }]
      }
    }).addTo(map);
    
    routing.on("routesfound", e => {
      const route = e.routes[0];
      const distance = route.summary ? route.summary.totalDistance : 0;
      const time = route.summary ? route.summary.totalTime : 0;
      
      console.log(`  ✓ Route ${i+1}: ${(distance/1000).toFixed(1)}km, ${(time/3600).toFixed(1)}h`);
      
      const routeLine = routing._line;
      if (routeLine) {
        routeLine.on("click", ev => {
          L.popup()
            .setLatLng(ev.latlng)
            .setContent(`
              🚗 <strong>Segment ${i+1}</strong><br>
              Distance: ${(distance / 1000).toFixed(1)} km<br>
              Durée: ${(time / 3600).toFixed(1)} h
            `)
            .openOn(map);
        });
      }
      
      i++;
      setTimeout(next, 800);
    });
    
    routing.on("routingerror", (e) => {
      console.log(`  ⚠️ Route ${i+1}: No road, drawing straight line`);
      
      const line = L.polyline([from, to], {
        color: "#e53935",
        weight: 4,
        dashArray: "6,6",
        opacity: 0.7
      }).addTo(map);
      
      const km = from.distanceTo(to) / 1000;
      line.on("click", ev => {
        L.popup()
          .setLatLng(ev.latlng)
          .setContent(`
            ⚠️ Pas de route disponible<br>
            Distance (à vol d'oiseau): ${km.toFixed(1)} km
          `)
          .openOn(map);
      });
      
      i++;
      setTimeout(next, 800);
    });
  }
  
  next();
}

console.log('✅ Script loaded successfully\n');
</script>
</body>
</html>
